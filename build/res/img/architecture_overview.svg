<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-labelledby="arch-title arch-desc">
  <title id="arch-title">Sockethub architecture overview</title>
  <desc id="arch-desc">Client apps on the left talk to a Sockethub gateway in the middle, which translates ActivityStreams 2.0 envelopes into IRC, XMPP, Atom/RSS, and arbitrary feeds on the right.</desc>

  <defs>
    <style><![CDATA[
      .panel       { fill: #fff8f1; stroke: #d28a5a; stroke-width: 1.2; }
      .panel-hub   { fill: #ffe8d5; stroke: #b45e20; stroke-width: 1.5; }
      .client      { fill: #fffefb; stroke: #a87047; stroke-width: 1; }
      .protocol    { fill: #fffefb; stroke: #a87047; stroke-width: 1; }
      .title       { font: 700 17px "SFMono-Regular", Menlo, Consolas, monospace; fill: #1a1a1a; }
      .label       { font: 600 15px "SFMono-Regular", Menlo, Consolas, monospace; fill: #1a1a1a; }
      .sub         { font: 12px system-ui, -apple-system, sans-serif;           fill: #5a3416; }
      .hub         { font: 700 22px system-ui, -apple-system, sans-serif;       fill: #7b2d0b; }
      .edge        { font: 600 12px "SFMono-Regular", Menlo, Consolas, monospace; fill: #7b2d0b; }
      .wire        { fill: none; stroke: #b45e20; stroke-width: 1.4; stroke-linecap: round; }
      .wire--dim   { fill: none; stroke: #c9a384; stroke-width: 1.1; stroke-dasharray: 4 4; stroke-linecap: round; }
    ]]></style>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45e20" />
    </marker>
  </defs>

  <!-- ===================== column headers ===================== -->
  <text x="130"  y="42" class="title">Client apps</text>
  <text x="530"  y="42" class="title">Sockethub gateway</text>
  <text x="1010" y="42" class="title">Protocols</text>

  <!-- ===================== client column ===================== -->
  <rect x="40" y="70" width="260" height="380" rx="12" class="panel" />

  <rect x="70" y="100" width="200" height="70" rx="8" class="client" />
  <text x="170" y="133" class="label" text-anchor="middle">Browser app</text>
  <text x="170" y="152" class="sub"   text-anchor="middle">sockethub-client (Socket.IO)</text>

  <rect x="70" y="200" width="200" height="70" rx="8" class="client" />
  <text x="170" y="233" class="label" text-anchor="middle">Mobile / native</text>
  <text x="170" y="252" class="sub"   text-anchor="middle">any AS2.0 capable runtime</text>

  <rect x="70" y="300" width="200" height="70" rx="8" class="client" />
  <text x="170" y="333" class="label" text-anchor="middle">Server / bot</text>
  <text x="170" y="352" class="sub"   text-anchor="middle">headless AS2.0 producer</text>

  <!-- ===================== gateway column ===================== -->
  <rect x="360" y="140" width="340" height="240" rx="14" class="panel-hub" />
  <text x="530" y="195" class="hub" text-anchor="middle">Sockethub</text>
  <text x="530" y="220" class="sub" text-anchor="middle">ActivityStreams 2.0 · JSON-LD</text>

  <rect x="400" y="245" width="260" height="42" rx="6" class="client" />
  <text x="530" y="272" class="label" text-anchor="middle">Platform dispatcher</text>

  <rect x="400" y="305" width="260" height="42" rx="6" class="client" />
  <text x="530" y="332" class="label" text-anchor="middle">Credential store · Redis</text>

  <!-- ===================== protocol column ===================== -->
  <rect x="900" y="70" width="260" height="380" rx="12" class="panel" />

  <rect x="930" y="100" width="200" height="60" rx="8" class="protocol" />
  <text x="1030" y="130" class="label" text-anchor="middle">IRC</text>
  <text x="1030" y="148" class="sub"   text-anchor="middle">Libera, OFTC, self-hosted</text>

  <rect x="930" y="175" width="200" height="60" rx="8" class="protocol" />
  <text x="1030" y="205" class="label" text-anchor="middle">XMPP</text>
  <text x="1030" y="223" class="sub"   text-anchor="middle">Prosody, ejabberd, MUC</text>

  <rect x="930" y="250" width="200" height="60" rx="8" class="protocol" />
  <text x="1030" y="280" class="label" text-anchor="middle">Feeds</text>
  <text x="1030" y="298" class="sub"   text-anchor="middle">RSS 2.0 · Atom</text>

  <rect x="930" y="325" width="200" height="60" rx="8" class="protocol" />
  <text x="1030" y="355" class="label" text-anchor="middle">Dummy / custom</text>
  <text x="1030" y="373" class="sub"   text-anchor="middle">pluggable platforms</text>

  <!-- ===================== wires: client → gateway ===================== -->
  <path class="wire" d="M 270 135 C 320 135, 340 240, 400 260" marker-end="url(#arrow)" />
  <path class="wire" d="M 270 235 C 320 235, 340 260, 400 266" marker-end="url(#arrow)" />
  <path class="wire" d="M 270 335 C 320 335, 340 280, 400 272" marker-end="url(#arrow)" />

  <text x="310" y="170" class="edge">AS2.0 over Socket.IO</text>

  <!-- ===================== wires: gateway → protocol ===================== -->
  <path class="wire" d="M 660 260 C 740 260, 820 130, 930 130" marker-end="url(#arrow)" />
  <path class="wire" d="M 660 270 C 740 270, 820 205, 930 205" marker-end="url(#arrow)" />
  <path class="wire" d="M 660 280 C 740 280, 820 280, 930 280" marker-end="url(#arrow)" />
  <path class="wire" d="M 660 290 C 740 290, 820 355, 930 355" marker-end="url(#arrow)" />

  <text x="740" y="420" class="edge" text-anchor="middle">protocol-native wire formats (translated per platform)</text>

  <!-- ===================== receive path (dim) ===================== -->
  <path class="wire--dim" d="M 400 340 C 340 340, 320 420, 270 420" />
  <text x="335" y="445" class="edge">inbound events flow back the same way</text>
</svg>
