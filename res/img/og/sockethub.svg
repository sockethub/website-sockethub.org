<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Sockethub — a protocol gateway for the web">
  <!-- Solid warm background (gradients render inconsistently in ImageMagick) -->
  <rect width="1200" height="630" fill="#fff4e6"/>

  <!-- Ember mark top-left -->
  <circle cx="88" cy="88" r="18" fill="#ff7a2a"/>
  <circle cx="88" cy="88" r="9"  fill="#ffd19a"/>
  <text x="124" y="100" font-family="sans-serif" font-weight="700" font-size="38" fill="#1a1a1a">sockethub</text>

  <!-- Eyebrow -->
  <text x="88" y="240" font-family="monospace" font-weight="700" font-size="22" fill="#b04514" letter-spacing="4">PROTOCOL GATEWAY</text>

  <!-- Big title -->
  <text x="88" y="360" font-family="sans-serif" font-weight="800" font-size="86" fill="#1a1a1a">Sockethub</text>

  <!-- Sub -->
  <text x="88" y="440" font-family="sans-serif" font-weight="400" font-size="36" fill="#4a3420">A protocol gateway for the web.</text>
  <text x="88" y="500" font-family="sans-serif" font-weight="400" font-size="30" fill="#7b3310">IRC · XMPP · RSS / Atom · Metadata</text>

  <!-- URL bottom-right -->
  <text x="1112" y="580" font-family="monospace" font-weight="600" font-size="24" fill="#7b3310" text-anchor="end">sockethub.org</text>
</svg>
